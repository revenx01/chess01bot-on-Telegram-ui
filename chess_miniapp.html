<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Chess</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #1a1a1a;
    --panel:     #262626;
    --panel2:    #2f2f2f;
    --border:    #3a3a3a;
    --light-sq:  #f0d9b5;
    --dark-sq:   #b58863;
    --hl-from:   rgba(205,210,106,0.7);
    --hl-to:     rgba(205,210,106,0.7);
    --hl-move:   rgba(20,85,30,0.5);
    --check:     rgba(220,50,50,0.7);
    --accent:    #9e9e9e;
    --accent2:   #bdbdbd;
    --text:      #e8e8e8;
    --text-dim:  #888;
    --white-piece: #fff;
    --black-piece: #1a1a1a;
    --capture:   rgba(200,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Source Sans 3', sans-serif; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px;
    margin: 0 auto; padding: 8px; gap: 6px; }

  /* ── Player cards ── */
  .player-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border-radius: 10px;
    padding: 8px 12px; border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .player-card.active { border-color: var(--accent); }
  .player-card.active::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--accent); border-radius:3px 0 0 3px;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--panel2); display:flex; align-items:center;
    justify-content:center; font-size: 18px; flex-shrink:0;
    border: 2px solid var(--border); overflow: hidden;
  }
  .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .player-info { flex: 1; min-width: 0; }
  .player-name { font-family: 'Rajdhani', sans-serif; font-weight:700;
    font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-meta { font-size:12px; color: var(--text-dim); display:flex; gap:8px; }
  .elo-badge { background: var(--panel2); border-radius:4px;
    padding:1px 6px; font-size:11px; font-weight:600; color: var(--accent); }
  .captures { display:flex; flex-wrap:wrap; gap:1px; margin-top:3px; font-size:11px; }
  .capture-piece { font-size:13px; opacity:0.8; }
  .score-diff { font-size:11px; color: var(--accent); font-weight:600; }
  .timer {
    font-family: 'Rajdhani', sans-serif; font-weight:700; font-size:22px;
    min-width: 72px; text-align:right; letter-spacing:1px;
    color: var(--text-dim); transition: color 0.3s;
  }
  .timer.active { color: var(--accent); }
  .timer.low { color: #e74c3c; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── Board wrapper ── */
  #board-wrap {
    position: relative; flex: 1; display: flex;
    align-items: center; justify-content: center;
  }
  #board-container {
    position: relative; width: 100%; aspect-ratio: 1;
    max-height: calc(100vh - 240px);
  }
  #board {
    width: 100%; height: 100%; display: grid;
    grid-template-columns: repeat(8,1fr); grid-template-rows: repeat(8,1fr);
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 2px #111;
  }

  .sq {
    position: relative; display:flex; align-items:center; justify-content:center;
    cursor: pointer; transition: background 0.1s;
    user-select: none; -webkit-user-select: none;
  }
  .sq.light { background: var(--light-sq); }
  .sq.dark  { background: var(--dark-sq); }
  .sq.selected { background: var(--hl-from) !important; }
  .sq.hl-move  { background: var(--hl-to) !important; }
  .sq.in-check { background: var(--check) !important; }
  .sq.last-from { box-shadow: inset 0 0 0 100px rgba(246,246,105,0.4); }
  .sq.last-to   { box-shadow: inset 0 0 0 100px rgba(246,246,105,0.4); }

  .sq .coord-file {
    position: absolute; bottom: 2px; right: 3px;
    font-size: 9px; font-weight:700; opacity: 0.7;
    color: inherit; pointer-events:none;
  }
  .sq .coord-rank {
    position: absolute; top: 2px; left: 3px;
    font-size: 9px; font-weight:700; opacity: 0.7;
    color: inherit; pointer-events:none;
  }
  .sq.light .coord-file, .sq.light .coord-rank { color: var(--dark-sq); }
  .sq.dark  .coord-file, .sq.dark  .coord-rank { color: var(--light-sq); }

  /* Legal move dots */
  .sq.legal-move::after {
    content:''; position:absolute;
    width:30%; height:30%; border-radius:50%;
    background: rgba(0,0,0,0.2); pointer-events:none; z-index:1;
  }
  .sq.legal-capture::after {
    content:''; position:absolute;
    width:100%; height:100%; border-radius:50%;
    box-shadow: inset 0 0 0 6px rgba(0,0,0,0.2);
    pointer-events:none; z-index:1;
  }

  /* Pieces */
  .piece {
    width: 90%; height: 90%; position: relative; z-index: 2;
    transition: transform 0.12s;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.45));
    will-change: transform;
    object-fit: contain;
  }
  .piece.dragging { transform: scale(1.18); opacity: 0.92; }

  /* ── Bottom panel ── */
  #bottom-panel {
    background: var(--panel); border-radius: 10px;
    border: 1px solid var(--border); padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .move-history {
    flex:1; display:flex; gap:4px; overflow-x:auto; scrollbar-width:none;
    font-family:'Rajdhani',sans-serif; font-size:13px; align-items:center;
  }
  .move-history::-webkit-scrollbar { display:none; }
  .move-token {
    background: var(--panel2); border-radius:4px;
    padding:2px 7px; white-space:nowrap; cursor:pointer;
    border: 1px solid transparent; color: var(--text-dim);
    transition: all 0.15s;
  }
  .move-token.current { border-color: var(--accent); color: var(--text); }
  .move-token.num { color: var(--text-dim); background:none; border:none;
    padding-right: 2px; cursor:default; }
  .btn {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 7px 14px;
    font-family: 'Rajdhani', sans-serif; font-weight:600; font-size:14px;
    cursor: pointer; transition: all 0.15s; white-space:nowrap;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); color:#fff; }
  .btn:active { transform: scale(0.96); }
  .btn.danger:hover { background: #e74c3c; border-color:#e74c3c; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color:#fff; }

  /* ── Status bar ── */
  #status-bar {
    text-align: center; font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--text-dim);
    min-height: 20px;
  }
  #status-bar.check { color: #e74c3c; }
  #status-bar.win   { color: var(--accent); }

  /* ── Promotion modal ── */
  #promo-modal {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.8); z-index:100;
    align-items:center; justify-content:center;
  }
  #promo-modal.show { display:flex; }
  .promo-box {
    background: var(--panel); border-radius:16px;
    border: 2px solid var(--accent); padding: 20px;
    display:flex; flex-direction:column; gap:12px; align-items:center;
  }
  .promo-box h3 { font-family:'Rajdhani',sans-serif; font-size:20px; }
  .promo-pieces { display:flex; gap:8px; }
  .promo-piece {
    width:64px; height:64px; background:var(--panel2);
    border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:40px; cursor:pointer;
    border:2px solid var(--border); transition:all 0.15s;
  }
  .promo-piece:hover { border-color:var(--accent); transform:scale(1.1); }

  /* ── Game over overlay ── */
  #gameover {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:200;
    align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
  }
  #gameover.show { display:flex; }
  .gameover-box {
    background:var(--panel); border-radius:20px;
    border:2px solid var(--accent); padding:32px 40px;
    text-align:center; display:flex; flex-direction:column; gap:12px;
  }
  .gameover-emoji { font-size:56px; }
  .gameover-title { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; }
  .gameover-sub { color:var(--text-dim); font-size:15px; }
  .gameover-actions { display:flex; gap:10px; justify-content:center; margin-top:8px; }

  /* ── Thinking indicator ── */
  .thinking { display:flex; gap:4px; align-items:center; }
  .thinking span {
    width:6px; height:6px; background:var(--accent);
    border-radius:50%; animation: bounce 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay:0.2s; }
  .thinking span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* Animations */
  @keyframes pieceAppear {
    from { transform: scale(0.5); opacity:0; }
    to   { transform: scale(1);   opacity:1; }
  }
  .piece-new { animation: pieceAppear 0.2s ease-out; }
</style>
</head>
<body>
<div id="app">

  <!-- Top player (opponent / black) -->
  <div class="player-card" id="card-black">
    <div class="avatar" id="avatar-black">♟</div>
    <div class="player-info">
      <div class="player-name" id="name-black">Opponent</div>
      <div class="player-meta">
        <span class="elo-badge" id="elo-black">1200</span>
        <span id="level-black">Lv.1</span>
      </div>
      <div class="captures" id="captures-black"></div>
    </div>
    <div class="timer" id="timer-black">10:00</div>
  </div>

  <!-- Status -->
  <div id="status-bar">White to move</div>

  <!-- Board -->
  <div id="board-wrap">
    <div id="board-container">
      <div id="board"></div>
    </div>
  </div>

  <!-- Bottom player (you / white) -->
  <div class="player-card active" id="card-white">
    <div class="avatar" id="avatar-white">♙</div>
    <div class="player-info">
      <div class="player-name" id="name-white">You</div>
      <div class="player-meta">
        <span class="elo-badge" id="elo-white">1200</span>
        <span id="level-white">Lv.1</span>
      </div>
      <div class="captures" id="captures-white"></div>
    </div>
    <div class="timer active" id="timer-white">10:00</div>
  </div>

  <!-- Move history + action buttons -->
  <div id="bottom-panel">
    <div class="move-history" id="move-history"></div>
    <button class="btn danger" onclick="resignGame()">Resign</button>
    <button class="btn" onclick="offerDraw()">½</button>
  </div>

</div>

<!-- Promotion modal -->
<div id="promo-modal">
  <div class="promo-box">
    <h3>Promote pawn to:</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- Game over overlay -->
<div id="gameover">
  <div class="gameover-box">
    <div class="gameover-emoji" id="go-emoji">🏆</div>
    <div class="gameover-title" id="go-title">You Won!</div>
    <div class="gameover-sub"   id="go-sub">by checkmate</div>
    <div class="gameover-actions">
      <button class="btn primary" onclick="sendResult()">Back to Chat</button>
      <button class="btn" onclick="closeGameOver()">View Board</button>
    </div>
  </div>
</div>

<script>
// ── Telegram Web App Init ──────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#1a1a1a');
  tg.setBackgroundColor('#1a1a1a');
}

// ── Parse init data ────────────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const gameId    = params.get('game_id')   || 'demo';
const myColor   = params.get('color')     || 'white';
const oppName   = params.get('opp_name')  || 'Opponent';
const oppElo    = params.get('opp_elo')   || '1200';
const oppLevel  = params.get('opp_level') || '1';
const myName    = tg?.initDataUnsafe?.user?.first_name || params.get('my_name') || 'You';
const myElo     = params.get('my_elo')    || '1200';
const myLevel   = params.get('my_level')  || '1';
const timerSecs = parseInt(params.get('timer') || '600');
const botMode   = params.get('bot') === '1';
const flipped   = myColor === 'black';

// ── Piece symbols ──────────────────────────────────────────────────────────
const PIECE_BASE = 'https://lichess1.org/assets/_bq5U0x/piece/maestro/';
const PIECES = {
  wK:'wK', wQ:'wQ', wR:'wR', wB:'wB', wN:'wN', wP:'wP',
  bK:'bK', bQ:'bQ', bR:'bR', bB:'bB', bN:'bN', bP:'bP',
};
const PIECE_VALUES = { p:1, n:3, b:3, r:5, q:9 };
const FILES = ['a','b','c','d','e','f','g','h'];

// ── Game State ─────────────────────────────────────────────────────────────
let game          = new Chess();
let selectedSq    = null;
let legalMoves    = [];
let lastMove      = null;
let promotionMove = null;
let gameOver      = false;
let moveHistory   = [];

let whiteTime = timerSecs, blackTime = timerSecs;
let timerInterval = null;
let activeTimer   = 'white';

// ── UI Setup ───────────────────────────────────────────────────────────────
function setupUI() {
  document.getElementById('name-white').textContent = myColor === 'white' ? myName : oppName;
  document.getElementById('name-black').textContent = myColor === 'black' ? myName : oppName;
  document.getElementById('elo-white').textContent  = myColor === 'white' ? myElo  : oppElo;
  document.getElementById('elo-black').textContent  = myColor === 'black' ? myElo  : oppElo;
  document.getElementById('level-white').textContent = `Lv.${myColor === 'white' ? myLevel : oppLevel}`;
  document.getElementById('level-black').textContent = `Lv.${myColor === 'black' ? myLevel : oppLevel}`;
}

// ── Board Rendering ────────────────────────────────────────────────────────
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let f = 0; f < 8; f++) {
      const sq = document.createElement('div');
      const rank = flipped ? r + 1 : 8 - r;
      const file = flipped ? 7 - f : f;
      const sqName = FILES[file] + rank;
      const isLight = (file + rank) % 2 === 1;

      sq.className = `sq ${isLight ? 'light' : 'dark'}`;
      sq.dataset.sq = sqName;

      // Coordinates
      if (f === 7) {
        const cr = document.createElement('span');
        cr.className = 'coord-rank';
        cr.textContent = rank;
        sq.appendChild(cr);
      }
      if (r === 7) {
        const cf = document.createElement('span');
        cf.className = 'coord-file';
        cf.textContent = FILES[file];
        sq.appendChild(cf);
      }

      sq.addEventListener('click', () => onSquareClick(sqName));
      board.appendChild(sq);
    }
  }
  renderPieces();
}

function renderPieces() {
  document.querySelectorAll('.sq').forEach(sq => {
    const existing = sq.querySelector('.piece');
    const sqName = sq.dataset.sq;
    const piece  = game.get(sqName);
    const key    = piece ? `${piece.color}${piece.type.toUpperCase()}` : null;

    // Clear highlights
    sq.classList.remove('legal-move','legal-capture','selected','last-from','last-to','in-check');

    // Last move highlight
    if (lastMove) {
      if (sqName === lastMove.from) sq.classList.add('last-from');
      if (sqName === lastMove.to)   sq.classList.add('last-to');
    }

    // Check highlight
    if (game.in_check()) {
      const turn = game.turn();
      const kings = game.board().flat().filter(p => p && p.type === 'k' && p.color === turn);
      if (kings.length && kings[0].square === sqName) sq.classList.add('in-check');
    }

    // Selected & legal moves
    if (selectedSq === sqName) sq.classList.add('selected');
    if (legalMoves.includes(sqName)) {
      if (piece) sq.classList.add('legal-capture');
      else       sq.classList.add('legal-move');
    }

    // Piece
    if (existing) existing.remove();
    if (key && PIECES[key]) {
      const p = document.createElement('img');
      p.className = 'piece';
      p.src = PIECE_BASE + PIECES[key] + '.svg';
      p.alt = key;
      p.draggable = false;
      sq.appendChild(p);
    }
  });
  updateCaptures();
  updateStatus();
}

// ── Click Logic ────────────────────────────────────────────────────────────
function onSquareClick(sqName) {
  if (gameOver) return;
  const isMyTurn = (game.turn() === 'w') === (myColor === 'white');
  if (!isMyTurn && !botMode) return;

  // If we have a selected piece
  if (selectedSq) {
    if (legalMoves.includes(sqName)) {
      tryMove(selectedSq, sqName);
      return;
    }
    if (sqName === selectedSq) {
      selectedSq = null; legalMoves = [];
      renderPieces(); return;
    }
  }

  // Select a piece
  const piece = game.get(sqName);
  if (piece && piece.color === game.turn()) {
    selectedSq  = sqName;
    legalMoves  = game.moves({ square: sqName, verbose: true }).map(m => m.to);
    renderPieces();
  } else {
    selectedSq = null; legalMoves = [];
    renderPieces();
  }
}

function tryMove(from, to) {
  const piece = game.get(from);
  // Check promotion
  if (piece?.type === 'p') {
    const toRank = parseInt(to[1]);
    if ((piece.color === 'w' && toRank === 8) || (piece.color === 'b' && toRank === 1)) {
      promotionMove = { from, to };
      showPromotion(piece.color);
      return;
    }
  }
  executeMove(from, to);
}

function executeMove(from, to, promo = null) {
  const moveObj = { from, to };
  if (promo) moveObj.promotion = promo;
  const result = game.move(moveObj);
  if (!result) return;

  lastMove = { from, to };
  selectedSq = null; legalMoves = [];
  moveHistory.push(result);
  updateMoveHistory();
  switchTimer();

  // Send move to bot
  if (tg && gameId !== 'demo') {
    tg.sendData(JSON.stringify({ type:'move', game_id:gameId, move: result.san }));
  }

  renderPieces();
  checkGameOver();

  // Bot response
  if (botMode && !gameOver) {
    setTimeout(botMove, 600 + Math.random() * 400);
  }
}

// ── Promotion ──────────────────────────────────────────────────────────────
function showPromotion(color) {
  const modal  = document.getElementById('promo-modal');
  const pieces = document.getElementById('promo-pieces');
  pieces.innerHTML = '';
  const opts = ['q','r','b','n'];
  const syms = color === 'w'
    ? { q:'♕', r:'♖', b:'♗', n:'♘' }
    : { q:'♛', r:'♜', b:'♝', n:'♞' };
  opts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'promo-piece';
    el.textContent = syms[p];
    el.style.color = color === 'w' ? 'var(--white-piece)' : 'var(--black-piece)';
    el.onclick = () => {
      modal.classList.remove('show');
      executeMove(promotionMove.from, promotionMove.to, p);
    };
    pieces.appendChild(el);
  });
  modal.classList.add('show');
}

// ── Simple Bot ─────────────────────────────────────────────────────────────
function botMove() {
  if (gameOver) return;
  const moves = game.moves({ verbose:true });
  if (!moves.length) return;
  // Prefer captures, then center, then random
  const captures = moves.filter(m => m.flags.includes('c'));
  const pick = captures.length && Math.random() > 0.3
    ? captures[Math.floor(Math.random()*captures.length)]
    : moves[Math.floor(Math.random()*moves.length)];
  executeMove(pick.from, pick.to, pick.promotion);
}

// ── Game Over ──────────────────────────────────────────────────────────────
function checkGameOver() {
  if (!game.game_over()) return;
  gameOver = true;
  stopTimer();
  let emoji='🏆', title='', sub='';
  if (game.in_checkmate()) {
    const winner = game.turn() === 'w' ? 'black' : 'white';
    const iWon   = winner === myColor;
    emoji = iWon ? '🏆' : '💀';
    title = iWon ? 'You Won!' : 'You Lost';
    sub   = 'by checkmate';
  } else if (game.in_stalemate())         { emoji='🤝'; title='Draw'; sub='Stalemate'; }
  else if (game.insufficient_material())  { emoji='🤝'; title='Draw'; sub='Insufficient material'; }
  else if (game.in_threefold_repetition()){ emoji='🤝'; title='Draw'; sub='Threefold repetition'; }
  else                                    { emoji='🤝'; title='Draw'; sub=''; }

  setTimeout(() => {
    document.getElementById('go-emoji').textContent = emoji;
    document.getElementById('go-title').textContent = title;
    document.getElementById('go-sub').textContent   = sub;
    document.getElementById('gameover').classList.add('show');
  }, 600);
}

function sendResult() {
  if (tg) tg.close();
}
function closeGameOver() {
  document.getElementById('gameover').classList.remove('show');
}
function resignGame() {
  if (gameOver) return;
  gameOver = true; stopTimer();
  if (tg && gameId !== 'demo') {
    tg.sendData(JSON.stringify({ type:'resign', game_id:gameId }));
  }
  document.getElementById('go-emoji').textContent = '🏳️';
  document.getElementById('go-title').textContent = 'You Resigned';
  document.getElementById('go-sub').textContent   = '';
  document.getElementById('gameover').classList.add('show');
}
function offerDraw() {
  if (tg && gameId !== 'demo') {
    tg.sendData(JSON.stringify({ type:'draw_offer', game_id:gameId }));
  }
  setStatus('Draw offered…');
}

// ── Status ─────────────────────────────────────────────────────────────────
function updateStatus() {
  const bar = document.getElementById('status-bar');
  if (gameOver) return;
  const turn   = game.turn() === 'w' ? 'White' : 'Black';
  const isMe   = (game.turn() === 'w') === (myColor === 'white');
  const prefix = isMe ? '✅ Your turn' : `⏳ ${oppName}'s turn`;
  if (game.in_check()) {
    bar.textContent = `⚠️ ${turn} is in check!`;
    bar.className = 'check';
  } else {
    bar.textContent = prefix;
    bar.className = '';
  }
}
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── Captures & material ────────────────────────────────────────────────────
function updateCaptures() {
  const history = game.history({ verbose:true });
  const wCaptures = [], bCaptures = [];
  history.forEach(m => {
    if (m.captured) {
      if (m.color === 'w') wCaptures.push(m.captured);
      else                 bCaptures.push(m.captured);
    }
  });
  const toHTML = (arr, color) => arr.map(p =>
    `<img src="${PIECE_BASE}${color}${p.toUpperCase()}.svg" class="capture-piece" style="width:18px;height:18px;vertical-align:middle;opacity:0.85">`
  ).join('');

  const [whiteCard, blackCard] = myColor === 'white'
    ? ['captures-white','captures-black']
    : ['captures-black','captures-white'];

  document.getElementById('captures-white').innerHTML = toHTML(wCaptures,'b');
  document.getElementById('captures-black').innerHTML = toHTML(bCaptures,'w');

  // Active card highlight
  const isWhiteTurn = game.turn() === 'w';
  document.getElementById('card-white').classList.toggle('active', isWhiteTurn);
  document.getElementById('card-black').classList.toggle('active', !isWhiteTurn);
  document.getElementById('timer-white').classList.toggle('active', isWhiteTurn);
  document.getElementById('timer-black').classList.toggle('active', !isWhiteTurn);
}

// ── Move history ───────────────────────────────────────────────────────────
function updateMoveHistory() {
  const el = document.getElementById('move-history');
  el.innerHTML = '';
  for (let i = 0; i < moveHistory.length; i++) {
    if (i % 2 === 0) {
      const num = document.createElement('span');
      num.className = 'move-token num';
      num.textContent = `${Math.floor(i/2)+1}.`;
      el.appendChild(num);
    }
    const tok = document.createElement('span');
    tok.className = `move-token${i === moveHistory.length-1 ? ' current' : ''}`;
    tok.textContent = moveHistory[i].san;
    el.appendChild(tok);
  }
  el.scrollLeft = el.scrollWidth;
}

// ── Timer ──────────────────────────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function startTimer() {
  timerInterval = setInterval(() => {
    if (activeTimer === 'white') {
      whiteTime = Math.max(0, whiteTime-1);
      const el = document.getElementById('timer-white');
      el.textContent = formatTime(whiteTime);
      el.classList.toggle('low', whiteTime < 30);
      if (whiteTime === 0) { gameOver=true; stopTimer();
        showGameOver('💀','Out of time!',''); }
    } else {
      blackTime = Math.max(0, blackTime-1);
      const el = document.getElementById('timer-black');
      el.textContent = formatTime(blackTime);
      el.classList.toggle('low', blackTime < 30);
      if (blackTime === 0) { gameOver=true; stopTimer();
        showGameOver('🏆','You Won!','on time'); }
    }
  }, 1000);
}
function stopTimer()   { clearInterval(timerInterval); }
function switchTimer() {
  activeTimer = game.turn() === 'w' ? 'white' : 'black';
}
function showGameOver(emoji, title, sub) {
  document.getElementById('go-emoji').textContent = emoji;
  document.getElementById('go-title').textContent = title;
  document.getElementById('go-sub').textContent   = sub;
  document.getElementById('gameover').classList.add('show');
}

// ── Init ───────────────────────────────────────────────────────────────────
setupUI();
buildBoard();
startTimer();

// Load existing FEN if provided (resuming game)
const fen = params.get('fen');
if (fen) {
  game.load(decodeURIComponent(fen));
  buildBoard();
}
</script>
