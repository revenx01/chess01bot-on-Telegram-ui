<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Chess01</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1a1a1a;color:#f0f0f0;font-family:'DM Sans',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.bar{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#222;border-bottom:1px solid #2e2e2e;flex-shrink:0}
.av{width:36px;height:36px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid #3a3a3a;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pname{font-weight:600;font-size:13px}
.pinfo{font-size:11px;color:#666}
.tmr{font-family:'Playfair Display',serif;font-weight:700;font-size:18px;margin-left:auto;padding:5px 12px;background:#2a2a2a;border:1px solid #333;border-radius:8px;min-width:62px;text-align:center;flex-shrink:0;transition:color .3s,border-color .3s}
.tmr.active{color:#f0f0f0;border-color:#555}
.tmr.low{color:#e05a5a!important;border-color:rgba(224,90,90,.5)!important}
#status{text-align:center;padding:7px 12px;font-size:13px;font-weight:600;background:#1f1f1f;border-bottom:1px solid #2a2a2a;flex-shrink:0;min-height:34px;display:flex;align-items:center;justify-content:center}
#status.chk{color:#e05a5a}
#moves-row{padding:5px 12px;background:#1c1c1c;border-bottom:1px solid #2a2a2a;flex-shrink:0;overflow-x:auto;white-space:nowrap;font-size:12px;color:#555;min-height:28px}
#moves-row::-webkit-scrollbar{display:none}
.mn{color:#444;margin-right:2px}
.mw,.mb{cursor:pointer;padding:1px 3px;border-radius:3px;transition:background .12s}
.mw.cur,.mb.cur{background:#333;color:#f0f0f0;font-weight:600}
#board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;min-width:0}
#board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;height:100%;max-width:100%;border-radius:6px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.7)}
.sq{display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.sq.l{background:#f0d9b5}.sq.d{background:#b58863}
.sq.sel{background:rgba(205,210,106,.85)!important}
.sq.lf,.sq.lt{background:rgba(205,210,106,.45)!important}
.sq.leg::after{content:'';position:absolute;width:32%;height:32%;border-radius:50%;background:rgba(0,0,0,.18);pointer-events:none}
.sq.leg.occ::after{display:none}
.sq.leg.occ{outline:3px solid rgba(0,0,0,.22);outline-offset:-3px}
.sq.chksq{background:rgba(220,50,50,.65)!important}
.pc{width:90%;height:90%;object-fit:contain;pointer-events:none;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))}
#btmbar{display:flex;gap:8px;padding:8px 12px;background:#222;border-top:1px solid #2e2e2e;flex-shrink:0}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #3a3a3a;background:#2a2a2a;color:#999;transition:all .15s;flex-shrink:0}
.btn:active{transform:scale(.94)}
.btn.danger:active,.btn.danger:hover{color:#e05a5a;border-color:rgba(224,90,90,.5);background:#2d1a1a}
.spacer{flex:1}
/* overlays */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
.ov.on{display:flex}
.ov-ico{font-size:64px}.ov-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700}.ov-sub{font-size:15px;color:#888}
.ov-btn{padding:13px 30px;border-radius:12px;font-family:'Playfair Display',serif;font-weight:700;font-size:17px;cursor:pointer;border:none;background:#555;color:#fff;transition:all .15s;margin-top:6px}
.ov-btn:active{transform:scale(.96)}
/* promo */
#promo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#promo.on{display:flex}
.pp{width:68px;height:68px;background:#2a2a2a;border-radius:12px;border:2px solid #444;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin:0 6px}
.pp img{width:80%;height:80%;object-fit:contain}
.pp:hover{border-color:#888}
/* waiting overlay */
#waiting{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:28px;text-align:center}
#waiting.on{display:flex}
.w-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.w-sub{font-size:14px;color:#666;line-height:1.6}
.link-box{background:#222;border:1px solid #3a3a3a;border-radius:12px;padding:12px 16px;font-size:13px;color:#aaa;word-break:break-all;max-width:340px;cursor:pointer;transition:border-color .2s}
.link-box:hover{border-color:#666}
.share-btn{padding:13px 28px;border-radius:12px;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;cursor:pointer;border:none;background:linear-gradient(135deg,#1a6b4a,#21916a);color:#e0fff4;width:100%;max-width:340px;transition:all .15s}
.share-btn:active{transform:scale(.97)}
.copy-btn{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #3a3a3a;background:#2a2a2a;color:#aaa;width:100%;max-width:340px;transition:all .15s}
.copy-btn:active{transform:scale(.96)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#888;border-radius:50%;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="app">
  <div class="bar" style="flex-direction:row-reverse">
    <div class="av" id="opp-av">?</div>
    <div style="flex:1;text-align:right">
      <div class="pname" id="opp-name">Opponent</div>
      <div class="pinfo" id="opp-elo">1200 ELO</div>
    </div>
    <div class="tmr" id="t-top">10:00</div>
  </div>
  <div id="status">Loading…</div>
  <div id="moves-row"></div>
  <div id="board-wrap"><div id="board"></div></div>
  <div class="bar">
    <div class="av" id="my-av">♟</div>
    <div style="flex:1">
      <div class="pname" id="my-name">You</div>
      <div class="pinfo" id="my-elo">1200 ELO</div>
    </div>
    <div class="tmr" id="t-bot">10:00</div>
  </div>
  <div id="btmbar">
    <button class="btn danger" onclick="resign()">🏳 Resign</button>
    <div class="spacer"></div>
    <button class="btn" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<!-- Game Over -->
<div class="ov" id="ov-end">
  <div class="ov-ico" id="end-ico">🏆</div>
  <div class="ov-title" id="end-title">You Won!</div>
  <div class="ov-sub" id="end-sub">by checkmate</div>
  <button class="ov-btn" onclick="goHome()">🏠 Back to Home</button>
</div>

<!-- Promotion -->
<div id="promo">
  <div style="font-family:'Playfair Display',serif;font-size:18px">Promote pawn</div>
  <div style="display:flex" id="promo-opts"></div>
</div>

<!-- Waiting for friend -->
<div id="waiting">
  <div style="font-size:48px">👥</div>
  <div class="w-title">Invite Your Friend</div>
  <div class="spinner" id="conn-spinner"></div>
  <div class="w-sub" id="wait-sub">Creating game room…</div>
  <div class="link-box" id="inv-link" onclick="copyLink()" style="display:none">Generating link…</div>
  <button class="copy-btn" id="copy-btn" onclick="copyLink()" style="display:none">📋 Copy Link</button>
  <button class="share-btn" id="share-btn" onclick="shareLink()" style="display:none">📨 Send via Telegram</button>
  <button class="btn" onclick="goHome()" style="margin-top:8px;width:100%;max-width:340px">← Back</button>
</div>

<script>
const tg  = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }

const P    = new URLSearchParams(location.search);
const MODE = P.get('mode') || 'bot';       // 'bot' | 'host' | 'guest'
const ROOM = P.get('room') || '';
const myColor  = P.get('color') || 'white';
const oppNameP = P.get('opp_name') ? decodeURIComponent(P.get('opp_name')) : 'Opponent';
const myNameP  = tg?.initDataUnsafe?.user?.first_name || (P.get('my_name') ? decodeURIComponent(P.get('my_name')) : 'You');
const myEloP   = P.get('my_elo')  || '1200';
const oppEloP  = P.get('opp_elo') || '1200';
const timerSec = parseInt(P.get('timer') || '600');
const botDiff  = parseInt(P.get('bot_diff') || '1');
const PIECE    = 'https://lichess1.org/assets/_bq5U0x/piece/maestro/';
const FILES    = ['a','b','c','d','e','f','g','h'];

// ── State ────────────────────────────────────────────────────────────────────
const game = new Chess();
let selSq=null, legal=[], lastF=null, lastT=null, promoQ=null;
let over=false, botBusy=false;
let wMs=timerSec*1000, bMs=timerSec*1000, tInt=null, lastTick=null;
let peer=null, conn=null;   // PeerJS

// ── DOM refs ─────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const board=$('board');
$('my-name').textContent   = myNameP;
$('my-elo').textContent    = myEloP+' ELO';
$('opp-name').textContent  = oppNameP;
$('opp-elo').textContent   = oppEloP+' ELO';
$('my-av').textContent     = myNameP.charAt(0).toUpperCase();
$('opp-av').textContent    = oppNameP.charAt(0).toUpperCase();

function fmt(ms){ const s=Math.max(0,Math.ceil(ms/1000)); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

// ── Board ────────────────────────────────────────────────────────────────────
function setBoardSize(){
  const wrap = document.getElementById('board-wrap');
  const sz = Math.min(wrap.clientWidth, wrap.clientHeight) - 12;
  board.style.width = sz+'px';
  board.style.height = sz+'px';
}
window.addEventListener('resize', setBoardSize);

function buildBoard(){
  setBoardSize();
  board.innerHTML='';
  for(let r=0;r<8;r++) for(let f=0;f<8;f++){
    const rank = myColor==='white' ? 8-r : r+1;
    const file = myColor==='white' ? f   : 7-f;
    const sq   = FILES[file]+rank;
    const light= (file+rank)%2===1;
    const d=document.createElement('div');
    d.className='sq '+(light?'l':'d');
    d.dataset.sq=sq;
    d.onclick=()=>onClick(sq);
    board.appendChild(d);
  }
  draw();
}

function draw(){
  board.querySelectorAll('.sq').forEach(el=>{
    const sq=el.dataset.sq, piece=game.get(sq);
    const light=el.classList.contains('l');
    el.className='sq '+(light?'l':'d');
    if(sq===selSq)            el.classList.add('sel');
    if(sq===lastF)            el.classList.add('lf');
    if(sq===lastT)            el.classList.add('lt');
    if(legal.includes(sq))  { el.classList.add('leg'); if(piece) el.classList.add('occ'); }
    if(game.in_check()){
      if(piece&&piece.type==='k'&&piece.color===game.turn()) el.classList.add('chksq');
    }
    el.innerHTML='';
    if(piece){ const i=document.createElement('img'); i.className='pc'; i.src=PIECE+piece.color+piece.type.toUpperCase()+'.svg'; el.appendChild(i); }
  });
}

// ── Click ────────────────────────────────────────────────────────────────────
function onClick(sq){
  if(over) return;
  if(MODE==='bot'){
    if(botBusy) return;
    if((game.turn()==='w')!==(myColor==='white')) return;
  }
  if(MODE==='host'||MODE==='guest'){
    if(!conn) return;
    if((game.turn()==='w')!==(myColor==='white')) return;
  }
  const piece=game.get(sq);
  if(selSq){
    if(legal.includes(sq)){ move(selSq,sq); return; }
    if(sq===selSq){ selSq=null; legal=[]; draw(); return; }
  }
  if(piece&&piece.color===game.turn()){
    selSq=sq; legal=game.moves({square:sq,verbose:true}).map(m=>m.to); draw();
  } else { selSq=null; legal=[]; draw(); }
}

// ── Move ─────────────────────────────────────────────────────────────────────
function move(from,to){
  const p=game.get(from);
  if(p&&p.type==='p'){
    const r=parseInt(to[1]);
    if((p.color==='w'&&r===8)||(p.color==='b'&&r===1)){
      promoQ={from,to}; showPromo(p.color); return;
    }
  }
  apply(from,to,null);
}

function apply(from,to,promo){
  const obj={from,to};
  if(promo) obj.promotion=promo;
  const r=game.move(obj);
  if(!r) return;
  lastF=from; lastT=to; selSq=null; legal=[];
  draw(); updateMoves(); tickTimer(); updateStatus(); checkEnd();
  // Send to opponent in P2P mode
  if((MODE==='host'||MODE==='guest')&&conn){
    try{ conn.send(JSON.stringify({from,to,promo})); }catch(e){}
  }
  // Bot response
  if(MODE==='bot'&&!over){
    const myT=(game.turn()==='w')===(myColor==='white');
    if(!myT) scheduleBot();
  }
}

// ── Bot ──────────────────────────────────────────────────────────────────────
function scheduleBot(){
  botBusy=true;
  setStatus('🤖 '+oppNameP+' is thinking…');
  setTimeout(runBot, 500+Math.random()*700);
}

function runBot(){
  if(over){ botBusy=false; return; }
  const moves=game.moves({verbose:true});
  if(!moves.length){ botBusy=false; return; }
  let pick;
  if(botDiff>=3){
    const caps=moves.filter(m=>m.captured), ctr=moves.filter(m=>['d4','d5','e4','e5'].includes(m.to));
    pick=caps.length?caps[Math.floor(Math.random()*caps.length)]:ctr.length?ctr[Math.floor(Math.random()*ctr.length)]:moves[Math.floor(Math.random()*moves.length)];
  } else if(botDiff===2){
    const caps=moves.filter(m=>m.captured);
    pick=caps.length&&Math.random()>.4?caps[Math.floor(Math.random()*caps.length)]:moves[Math.floor(Math.random()*moves.length)];
  } else {
    pick=moves[Math.floor(Math.random()*moves.length)];
  }
  // Apply bot move directly (do NOT go through apply() to avoid re-triggering)
  const r=game.move({from:pick.from,to:pick.to,promotion:pick.promotion||undefined});
  if(!r){ botBusy=false; return; }
  lastF=pick.from; lastT=pick.to; selSq=null; legal=[];
  botBusy=false;
  draw(); updateMoves(); tickTimer(); updateStatus(); checkEnd();
}

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(msg,chk){
  const el=$('status'); el.textContent=msg; el.className=chk?'chk':'';
}
function updateStatus(){
  if(over) return;
  const myT=(game.turn()==='w')===(myColor==='white');
  if(game.in_check()) setStatus((myT?'⚠️ You are':'⚠️ '+oppNameP+' is')+' in check!',true);
  else {
    if(MODE==='bot') setStatus(myT?'✅ Your turn':'⏳ '+oppNameP+'\'s turn');
    else setStatus(myT?'✅ Your turn':'⏳ '+oppNameP+'\'s turn');
  }
}

// ── End ──────────────────────────────────────────────────────────────────────
function checkEnd(){
  if(!game.game_over()) return;
  over=true; stopTimer();
  let ico='🏆',title='',sub='';
  if(game.in_checkmate()){
    const wWins=game.turn()==='b';
    const iWon=wWins===(myColor==='white');
    ico=iWon?'🏆':'💀'; title=iWon?'You Won!':oppNameP+' Wins!'; sub='by checkmate';
  } else if(game.in_stalemate()){ico='🤝';title='Draw';sub='Stalemate';}
  else if(game.insufficient_material()){ico='🤝';title='Draw';sub='Insufficient material';}
  else if(game.in_threefold_repetition()){ico='🤝';title='Draw';sub='Repetition';}
  else{ico='🤝';title='Draw';sub='';}
  setTimeout(()=>{ $('end-ico').textContent=ico; $('end-title').textContent=title; $('end-sub').textContent=sub; $('ov-end').classList.add('on'); },500);
}

// ── Timer ────────────────────────────────────────────────────────────────────
function tickTimer(){
  if(!tInt){ lastTick=Date.now(); tInt=setInterval(runTimer,100); }
  lastTick=Date.now();
}
function runTimer(){
  if(over){stopTimer();return;}
  const now=Date.now(), dt=now-lastTick; lastTick=now;
  if(game.turn()==='w') wMs=Math.max(0,wMs-dt); else bMs=Math.max(0,bMs-dt);
  const tTop=myColor==='white'?bMs:wMs, tBot=myColor==='white'?wMs:bMs;
  $('t-top').textContent=fmt(tTop); $('t-bot').textContent=fmt(tBot);
  const actW=game.turn()==='w';
  $('t-top').className='tmr'+(myColor==='white'?!actW:actW?' active':'')+(tTop<30000?' low':'');
  $('t-bot').className='tmr'+(myColor==='white'?actW:!actW?' active':'')+(tBot<30000?' low':'');
  if(wMs===0||bMs===0){
    over=true; stopTimer();
    const wWins=bMs===0;
    $('end-ico').textContent='⏰';
    $('end-title').textContent=(wWins===(myColor==='white'))?'You win on time!':oppNameP+' wins on time!';
    $('end-sub').textContent='';
    $('ov-end').classList.add('on');
  }
}
function stopTimer(){ clearInterval(tInt); tInt=null; }

// ── Moves list ───────────────────────────────────────────────────────────────
function updateMoves(){
  const h=game.history(); const el=$('moves-row'); el.innerHTML='';
  for(let i=0;i<h.length;i+=2){
    el.innerHTML+=`<span class="mn">${i/2+1}.</span><span class="mw${i===h.length-1?' cur':''}">${h[i]}</span> `;
    if(h[i+1]) el.innerHTML+=`<span class="mb${i+1===h.length-1?' cur':''}">${h[i+1]}</span> `;
  }
  el.scrollLeft=el.scrollWidth;
}

// ── Promotion ────────────────────────────────────────────────────────────────
function showPromo(color){
  const el=$('promo-opts'); el.innerHTML='';
  ['q','r','b','n'].forEach(p=>{
    const d=document.createElement('div'); d.className='pp';
    d.innerHTML=`<img src="${PIECE}${color}${p.toUpperCase()}.svg">`;
    d.onclick=()=>{ $('promo').classList.remove('on'); apply(promoQ.from,promoQ.to,p); promoQ=null; };
    el.appendChild(d);
  });
  $('promo').classList.add('on');
}

// ── P2P (PeerJS) ─────────────────────────────────────────────────────────────
function initHost(){
  $('waiting').classList.add('on');
  $('wait-sub').textContent='Creating your game room…';
  const roomId = 'chess01-'+Math.random().toString(36).slice(2,8);
  try{
    peer = new Peer(roomId, {debug:0});
    peer.on('open', id=>{
      const base = location.origin+location.pathname.replace('chess_miniapp.html','');
      const link = base+'chess_miniapp.html?mode=guest&room='+id
        +'&color=black&opp_name='+encodeURIComponent(myNameP)
        +'&opp_elo='+myEloP+'&my_elo='+myEloP+'&timer='+timerSec;
      $('conn-spinner').style.display='none';
      $('wait-sub').textContent='Share this link with your friend:';
      $('inv-link').textContent=link;
      $('inv-link').dataset.link=link;
      $('inv-link').style.display='block';
      $('copy-btn').style.display='block';
      $('share-btn').style.display='block';
    });
    peer.on('connection', c=>{
      conn=c;
      conn.on('open',()=>{
        $('waiting').classList.remove('on');
        buildBoard(); updateStatus();
        setStatus('✅ Friend connected! Your turn');
      });
      conn.on('data', d=>{
        const m=JSON.parse(d);
        if(m.type==='hello'){
          // Update opponent name with friend's real Telegram name
          const n = m.name || oppNameP;
          $('opp-name').textContent = n;
          $('opp-elo').textContent  = (m.elo||'1200')+' ELO';
          $('opp-av').textContent   = n.charAt(0).toUpperCase();
          // Send our identity back
          try{ conn.send(JSON.stringify({type:'hello',name:myNameP,elo:myEloP})); }catch(e){}
          return;
        }
        apply(m.from,m.to,m.promo||null);
      });
      conn.on('close',()=>{ if(!over) setStatus('⚠️ Friend disconnected'); });
    });
    peer.on('error', e=>{ $('wait-sub').textContent='Connection error. Try again.'; console.error(e); });
  } catch(e){ $('wait-sub').textContent='Could not create room. Check connection.'; }
}

function initGuest(){
  $('waiting').classList.add('on');
  $('wait-sub').textContent='Connecting to your friend…';
  $('conn-spinner').style.display='block';
  try{
    peer = new Peer({debug:0});
    peer.on('open', ()=>{
      conn = peer.connect(ROOM, {reliable:true});
      conn.on('open',()=>{
        $('waiting').classList.remove('on');
        buildBoard(); updateStatus();
        setStatus('✅ Connected! Waiting for White\'s move…');
      });
      conn.on('data', d=>{ const m=JSON.parse(d); apply(m.from,m.to,m.promo||null); });
      conn.on('close',()=>{ if(!over) setStatus('⚠️ Friend disconnected'); });
    });
    peer.on('error', e=>{ $('wait-sub').textContent='Could not connect. Check the link.'; console.error(e); });
  } catch(e){ $('wait-sub').textContent='Could not connect. Check the link.'; }
}

let invLink='';
function copyLink(){
  invLink=$('inv-link').dataset.link||$('inv-link').textContent;
  if(navigator.clipboard){ navigator.clipboard.writeText(invLink).then(()=>{ $('copy-btn').textContent='✅ Copied!'; setTimeout(()=>$('copy-btn').textContent='📋 Copy Link',2000); }); }
  else{ const ta=document.createElement('textarea'); ta.value=invLink; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); $('copy-btn').textContent='✅ Copied!'; setTimeout(()=>$('copy-btn').textContent='📋 Copy Link',2000); }
}
function shareLink(){
  invLink=$('inv-link').dataset.link||$('inv-link').textContent;
  if(tg&&tg.openTelegramLink){ tg.openTelegramLink('https://t.me/share/url?url='+encodeURIComponent(invLink)+'&text='+encodeURIComponent('Play chess with me! 🎮')); }
  else if(navigator.share){ navigator.share({title:'Chess01',text:'Play chess with me!',url:invLink}); }
  else copyLink();
}

// ── Actions ──────────────────────────────────────────────────────────────────
function resign(){
  if(over) return;
  over=true; stopTimer();
  $('end-ico').textContent='🏳️'; $('end-title').textContent='You Resigned'; $('end-sub').textContent='';
  $('ov-end').classList.add('on');
}
function goHome(){ location.href=location.origin+location.pathname.replace('chess_miniapp.html','')+'index.html'; }

// ── Start ────────────────────────────────────────────────────────────────────
if(MODE==='host'){
  initHost();
} else if(MODE==='guest'){
  initGuest();
} else {
  // Bot game
  buildBoard();
  setStatus('✅ Your turn');
  if(myColor==='black'){ botBusy=true; setTimeout(runBot,800); }
}
