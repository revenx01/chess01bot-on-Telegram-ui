<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Chess01</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#111;color:#f0f0f0;font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px}
.logo{font-size:64px;margin-bottom:4px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-family:'Playfair Display',serif;font-weight:800;font-size:32px;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:48px}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.card{border-radius:20px;padding:22px 24px;cursor:pointer;display:flex;align-items:center;gap:18px;border:1px solid transparent;transition:transform .15s;position:relative;overflow:hidden}
.card:active{transform:scale(.96)}
.card.bot{background:linear-gradient(135deg,#1a2d2a,#1a3530);border-color:rgba(76,175,138,.3)}
.card.friend{background:linear-gradient(135deg,#2d2a1a,#40361a);border-color:rgba(212,168,67,.3)}
.card-ico{font-size:42px;flex-shrink:0}
.card-title{font-family:'Playfair Display',serif;font-weight:800;font-size:22px}
.card-sub{font-size:13px;color:#888;margin-top:3px}
.card-extra{display:none;margin-top:14px}
.card.open .card-extra{display:block}
.diff-row{display:flex;gap:8px}
.diff{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:#aaa}
.diff.sel{background:rgba(76,175,138,.2);border-color:rgba(76,175,138,.5);color:#4caf9a}
.fr-inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 14px;color:#f0f0f0;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:0}
.fr-inp::placeholder{color:#555}
.fr-inp:focus{border-color:rgba(212,168,67,.5)}
.go-btn{display:block;width:100%;background:#888;color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;cursor:pointer;margin-top:12px;transition:all .18s}
.go-btn:active{transform:scale(.97)}
.go-btn.gold{background:linear-gradient(135deg,#c9973a,#e0b84a);color:#fff}
.hint{font-size:12px;color:#444;text-align:center;margin-top:32px;line-height:1.7}
</style>
</head>
<body>

<div class="logo">♟️</div>
<h1>Chess01</h1>
<p class="sub">Pick your game and play</p>

<div class="cards">

  <div class="card bot" id="card-bot" onclick="toggle('bot')">
    <div class="card-ico">🤖</div>
    <div style="flex:1;min-width:0">
      <div class="card-title">vs Bot</div>
      <div class="card-sub">Play against the computer</div>
      <div class="card-extra">
        <div class="diff-row" style="margin-bottom:12px">
          <div class="diff sel" data-d="1" onclick="pickDiff(event,this)">Easy</div>
          <div class="diff"     data-d="2" onclick="pickDiff(event,this)">Medium</div>
          <div class="diff"     data-d="3" onclick="pickDiff(event,this)">Hard</div>
        </div>
        <button class="go-btn" onclick="startBot(event)">▶ Play Now</button>
      </div>
    </div>
  </div>

  <div class="card friend" id="card-friend" onclick="toggle('friend')">
    <div class="card-ico">👥</div>
    <div style="flex:1;min-width:0">
      <div class="card-title">vs Friend</div>
      <div class="card-sub">Pass &amp; play on same device</div>
      <div class="card-extra">
        <input class="fr-inp" id="fr-name" placeholder="Friend's name (optional)" autocomplete="off" onclick="event.stopPropagation()"/>
        <button class="go-btn gold" onclick="startFriend(event)">⚔️ Start Game</button>
      </div>
    </div>
  </div>

</div>

<p class="hint">Tap a card to expand,<br>then press Play.</p>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#111');tg.setBackgroundColor('#111');}
const TGU=tg?.initDataUnsafe?.user;
const ME={name:'Player',elo:1200,level:1};
if(TGU) ME.name=(TGU.first_name||'')+(TGU.last_name?' '+TGU.last_name:'');

let openCard=null,selDiff=1;

function toggle(id){
  if(openCard===id){document.getElementById('card-'+id).classList.remove('open');openCard=null;return;}
  if(openCard)document.getElementById('card-'+openCard).classList.remove('open');
  document.getElementById('card-'+id).classList.add('open');
  openCard=id;
}

function pickDiff(e,el){
  e.stopPropagation();
  document.querySelectorAll('.diff').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
  selDiff=parseInt(el.dataset.d);
}

function base(){return location.origin+location.pathname.replace('index.html','').replace(/\/+$/,'/');}

function startBot(e){
  e.stopPropagation();
  const belo={1:'800',2:'1400',3:'2000'}[selDiff]||'1200';
  location.href=base()+'chess_miniapp.html?color=white&timer=600&bot=1&bot_diff='+selDiff
    +'&opp_name=Chess+Bot&opp_elo='+belo+'&opp_level=1'
    +'&my_name='+encodeURIComponent(ME.name)+'&my_elo='+ME.elo+'&my_level='+ME.level;
}

function startFriend(e){
  e.stopPropagation();
  const fr=document.getElementById('fr-name').value.trim()||'Friend';
  location.href=base()+'chess_miniapp.html?color=white&timer=600&bot=0&local2p=1'
    +'&opp_name='+encodeURIComponent(fr)+'&opp_elo=1200&opp_level=1'
    +'&my_name='+encodeURIComponent(ME.name)+'&my_elo='+ME.elo+'&my_level='+ME.level;
}
</script>
</body>
</html>
