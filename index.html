<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Chess01</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#0e0e0e;color:#f0f0f0;font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px 20px}
body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none}
.top{display:flex;flex-direction:column;align-items:center;margin-bottom:36px}
.piece{font-size:68px;line-height:1;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(255,255,255,.1));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.title{font-family:'Playfair Display',serif;font-weight:800;font-size:34px;background:linear-gradient(135deg,#fff 30%,#666);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.greet{font-size:14px;color:#444;margin-top:6px}
.cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px}
.card{border-radius:20px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);overflow:hidden;cursor:pointer;transition:transform .15s,border-color .2s}
.card:active{transform:scale(.98)}
.card.open{border-color:rgba(255,255,255,.13)}
.card-top{display:flex;align-items:center;gap:14px;padding:18px 20px}
.card-ico{font-size:36px;flex-shrink:0}
.card-title{font-family:'Playfair Display',serif;font-weight:800;font-size:20px}
.card-desc{font-size:12px;color:#555;margin-top:2px}
.card-arr{margin-left:auto;font-size:20px;color:#333;transition:transform .25s}
.card.open .card-arr{transform:rotate(90deg);color:#666}
.card-body{display:none;padding:0 20px 20px}
.card.open .card-body{display:block}
.divider{height:1px;background:rgba(255,255,255,.06);margin-bottom:16px}
.diff-lbl{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.diff-row{display:flex;gap:6px;margin-bottom:16px}
.diff{flex:1;text-align:center;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.07);color:#555;background:rgba(255,255,255,.03);transition:all .15s}
.diff.sel{background:rgba(76,175,138,.15);border-color:rgba(76,175,138,.4);color:#4caf9a}
.diff:active{transform:scale(.93)}
.go{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Playfair Display',serif;font-weight:700;font-size:17px;cursor:pointer;transition:all .15s;letter-spacing:.3px;display:block}
.go:active{transform:scale(.97);opacity:.9}
.go.green{background:linear-gradient(135deg,#1a5c40,#1e8060);color:#d0ffe8}
.go.gold{background:linear-gradient(135deg,#7a5010,#b8821a);color:#fff5d0}
.go.grey{background:rgba(255,255,255,.07);color:#666;font-size:14px;margin-top:8px;border:1px solid rgba(255,255,255,.08)}
.link-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 13px;font-size:12px;color:#888;word-break:break-all;margin-bottom:10px;display:none;line-height:1.5}
.hint{font-size:12px;color:#2a2a2a;text-align:center;margin-top:24px;line-height:1.8}
</style>
</head>
<body>

<div class="top">
  <div id="home-av" style="width:70px;height:70px;border-radius:50%;background:#222;border:3px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin-bottom:10px;overflow:hidden;flex-shrink:0"></div>
  <div class="title">Chess01</div>
  <div class="greet" id="greet">Welcome!</div>
</div>

<div class="cards">

  <!-- VS BOT -->
  <div class="card" id="card-bot" onclick="toggle('bot')">
    <div class="card-top">
      <div class="card-ico">🤖</div>
      <div>
        <div class="card-title">vs Bot</div>
        <div class="card-desc">Play against the computer</div>
      </div>
      <div class="card-arr">›</div>
    </div>
    <div class="card-body">
      <div class="divider"></div>
      <div class="diff-lbl">Difficulty</div>
      <div class="diff-row">
        <div class="diff sel" data-d="1" onclick="pickDiff(event,this)">Easy</div>
        <div class="diff"     data-d="2" onclick="pickDiff(event,this)">Medium</div>
        <div class="diff"     data-d="3" onclick="pickDiff(event,this)">Hard</div>
      </div>
      <button class="go green" onclick="startBot(event)">▶ Play Now</button>
    </div>
  </div>

  <!-- VS FRIEND -->
  <div class="card" id="card-friend" onclick="toggle('friend')">
    <div class="card-top">
      <div class="card-ico">👥</div>
      <div>
        <div class="card-title">vs Friend</div>
        <div class="card-desc">Send a link to play together</div>
      </div>
      <div class="card-arr">›</div>
    </div>
    <div class="card-body">
      <div class="divider"></div>
      <p style="font-size:13px;color:#555;line-height:1.6;margin-bottom:14px">
        Generate a link and send it to your friend on Telegram.
      </p>
      <div class="link-box" id="link-box"></div>
      <button class="go gold" id="gen-btn" onclick="genLink(event)">🔗 Generate Invite Link</button>
      <button class="go grey"  id="copy-btn" onclick="copyLink(event)" style="display:none">📋 Copy Link</button>
      <button class="go gold"  id="share-btn" onclick="shareLink(event)" style="display:none;margin-top:8px">📨 Send via Telegram</button>
      <button class="go green" id="start-btn" onclick="startAsHost(event)" style="display:none;margin-top:8px">▶ Start Game (I'm ready)</button>
    </div>
  </div>

</div>

<div class="hint">Tap a card to get started</div>
<div style="position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:12px;font-weight:600;background:linear-gradient(135deg,#ffffff,#aaaaaa,#666666);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px">♟️ Game developed by @arrivedrev</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#0e0e0e'); tg.setBackgroundColor('#0e0e0e'); }
const TGU = tg?.initDataUnsafe?.user;
const myName = TGU ? (TGU.first_name + (TGU.last_name ? ' '+TGU.last_name : '')) : 'Player';
const myElo  = 1200;

document.getElementById('greet').textContent = 'Welcome, ' + myName.split(' ')[0] + '!';
const avEl = document.getElementById('home-av');
if(TGU?.photo_url){
  avEl.innerHTML = '<img src="'+TGU.photo_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentNode.textContent=myName.charAt(0).toUpperCase()">';
} else {
  avEl.textContent = myName.charAt(0).toUpperCase();
}

let openCard = null;
let selDiff  = 1;
let inviteLink = '';

function toggle(id){
  if(openCard === id){
    document.getElementById('card-'+id).classList.remove('open');
    openCard = null;
    return;
  }
  if(openCard) document.getElementById('card-'+openCard).classList.remove('open');
  document.getElementById('card-'+id).classList.add('open');
  openCard = id;
}

function pickDiff(e, el){
  e.stopPropagation();
  document.querySelectorAll('.diff').forEach(d => d.classList.remove('sel'));
  el.classList.add('sel');
  selDiff = parseInt(el.dataset.d);
}

function pageBase(){
  let p = location.pathname.replace('index.html','');
  if(!p.endsWith('/')) p += '/';
  return location.origin + p;
}

function startBot(e){
  e.stopPropagation();
  const elos = {1:'800', 2:'1400', 3:'2000'};
  location.href = pageBase() + 'chess_miniapp.html'
    + '?mode=bot&bot_diff=' + selDiff
    + '&color=white&timer=600'
    + '&opp_name=Chess%20Bot&opp_elo=' + elos[selDiff]
    + '&my_name=' + encodeURIComponent(myName)
    + '&my_elo=' + myElo;
}

function genLink(e){
  e.stopPropagation();
  const roomId = 'c01' + Math.random().toString(36).slice(2,8);
  const BOT_USERNAME = 'Chess01Bot';
  inviteLink = 'https://t.me/' + BOT_USERNAME + '?start=join_' + roomId;

  document.getElementById('link-box').textContent = inviteLink;
  document.getElementById('link-box').style.display = 'block';
  document.getElementById('gen-btn').textContent = '🔄 New Link';
  document.getElementById('copy-btn').style.display = 'block';
  document.getElementById('share-btn').style.display = 'block';

  // Store room id for when user is ready
  window._pendingRoom = roomId;
  document.getElementById('start-btn').style.display = 'block';
}

function copyLink(e){
  e.stopPropagation();
  if(!inviteLink) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(inviteLink).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy Link', 2000);
    });
  }
}

function shareLink(e){
  e.stopPropagation();
  if(!inviteLink) return;
  const url = 'https://t.me/share/url?url=' + encodeURIComponent(inviteLink)
    + '&text=' + encodeURIComponent('♟️ Play chess with me on Chess01!');
  if(tg && tg.openTelegramLink) tg.openTelegramLink(url);
  else window.open(url, '_blank');
}

function startAsHost(e){
  e.stopPropagation();
  const roomId = window._pendingRoom;
  if(!roomId) return;
  location.href = pageBase() + 'chess_miniapp.html'
    + '?mode=host&room=' + roomId
    + '&color=white&timer=600'
    + '&my_name=' + encodeURIComponent(myName)
    + '&my_elo=' + myElo
    + '&opp_name=Friend&opp_elo=1200';
}
</script>
</body>
</html>
